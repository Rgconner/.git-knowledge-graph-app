# Alembic configuration for the Knowledge Graph backend.
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template used to generate new migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Use UTC timestamps in migration file names.
timezone = UTC

# Comma-separated list of token directives Alembic should not truncate.
# (Leave at default.)
truncate_slug_length = 40

# sys.path path entries; relative to this file.
prepend_sys_path = .

# Default database URL (overridden at runtime by DATABASE_URL env variable).
sqlalchemy.url = postgresql://kg_user:kg_password@localhost:5432/knowledge_graph

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
